name: Update Veille

on:
  schedule:
    - cron: "0 7 * * *"   # Tous les jours à 7h UTC
  workflow_dispatch:        # Déclenchement manuel depuis l'onglet Actions

jobs:
  update-veille:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run RSS fetcher
        run: python scripts/update_veille.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add veille-data.json
          git diff --staged --quiet || git commit -m "chore: auto-update veille [skip ci]"
          git push
